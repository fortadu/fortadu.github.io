<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lista de Presentes - Erick & Francine</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
:root {
    --verde-pastel-claro: #e0f7f5;
    --verde-pastel: #7edbd3;
    --verde-pastel-escuro: #2bbbad;
    --nude-pastel: #f5f0eb;
    --rosa-pastel: #f2dcdc;
}

body {
    background: var(--verde-pastel-claro);
    font-family: sans-serif;
    margin: 0;
}

header {
    background: var(--verde-pastel);
    text-align: center;
    padding: 20px;
}

h1 {
    font-family: 'Playfair Display';
    font-size: 22px;
}

main {
    max-width: 600px;
    margin: auto;
    padding: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border: none;
    background: var(--verde-pastel-escuro);
    color: white;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
}

.presente-item {
    background: var(--nude-pastel);
    margin-bottom: 8px;
    padding: 12px;
    border-radius: 6px;
    display: flex;
    gap: 10px;
    cursor: pointer;
}

.presente-item.checked {
    background: var(--rosa-pastel);
    opacity: 0.6;
    text-decoration: line-through;
}

.categoria {
    font-weight: bold;
    margin-top: 15px;
}

</style>
</head>

<body>

<header>
<h1>Lista de Presentes<br>Erick & Francine</h1>
</header>

<main>

<button onclick="importarPresentes()">📥 Importar lista (usar só 1 vez)</button>

<ul id="lista-presentes"></ul>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB0FNd2sdqLARe3HfdFNv5yhQpIN9AQZNI",
    authDomain: "lista-presentes-casament-a314f.firebaseapp.com",
    projectId: "lista-presentes-casament-a314f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById('lista-presentes');

function criarItem(id, nome, marcado, categoria) {

    if (categoria) {
        const li = document.createElement('li');
        li.className = 'categoria';
        li.innerText = nome;
        return li;
    }

    const li = document.createElement('li');
    li.className = 'presente-item';
    if (marcado) li.classList.add('checked');

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = marcado;

    const span = document.createElement('span');
    span.innerText = nome;

    li.appendChild(checkbox);
    li.appendChild(span);

    li.onclick = async () => {
        await updateDoc(doc(db, 'presentes', id), {
            marcado: !checkbox.checked
        });
    };

    return li;
}

onSnapshot(collection(db, 'presentes'), (snapshot) => {
    lista.innerHTML = '';

    snapshot.forEach(docSnap => {
        const d = docSnap.data();
        lista.appendChild(criarItem(docSnap.id, d.nome, d.marcado, d.categoria));
    });
});

window.importarPresentes = async function () {

const presentes = [

{ nome: "🍳 COZINHA", marcado: false, categoria: true },

{ nome: "Jogo de copos", marcado: false },
{ nome: "Jogo de talheres", marcado: false },
{ nome: "Faqueiro", marcado: false },
{ nome: "Espátula para manteiga", marcado: false },
{ nome: "Panos de prato", marcado: false },
{ nome: "Formas variadas", marcado: false },
{ nome: "Porta temperos (sal, pimenta, azeite)", marcado: false },
{ nome: "Molheira de vidro", marcado: false },
{ nome: "Tábua de carne", marcado: false },
{ nome: "Potes de mantimentos", marcado: false },

{ nome: "🚿 BANHEIRO", marcado: false, categoria: true },
{ nome: "Porta escova de dente", marcado: false },
{ nome: "Porta sabonete líquido", marcado: false },

{ nome: "🛏️ CAMA, MESA E BANHO", marcado: false, categoria: true },
{ nome: "Lençol", marcado: false },
{ nome: "Fronha", marcado: false },

{ nome: "🧺 ÁREA DE SERVIÇO", marcado: false, categoria: true },
{ nome: "Vassoura", marcado: false },
{ nome: "Rodo", marcado: false }

];

for (const item of presentes) {
    await addDoc(collection(db, "presentes"), item);
}

alert("✅ Lista importada com sucesso!");
};

</script>

</body>
</html>
