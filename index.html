<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lista de Presentes - Erick & Francine</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
:root {
    --verde-pastel-claro: #e0f7f5;
    --verde-pastel: #7edbd3;
    --verde-pastel-escuro: #2bbbad;
    --nude-pastel: #ffffff;
    --rosa-pastel: #f2dcdc;
}

body {
    background: #dff3f1;
    font-family: sans-serif;
    margin: 0;
}

header {
    background: var(--verde-pastel);
    text-align: center;
    padding: 20px;
}

h1 {
    font-family: 'Playfair Display';
    font-size: 22px;
}

main {
    max-width: 600px;
    margin: auto;
    padding: 10px;
}

ul {
    padding: 0;
    margin: 0;
    list-style: none;
}

.presente-item {
    background: #ffffff;
    margin: 10px auto;
    padding: 14px 16px;
    border-radius: 12px;
    width: 90%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);

    transition: all 0.2s ease;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(5px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Clique (celular) */
.presente-item:active {
    transform: scale(0.97);
}

.presente-item:active {
    transform: scale(0.97);
}

.presente-item.checked {
    background: #c7ebe7;
    color: #555;
    text-decoration: line-through;
    transform: scale(0.98);
    transition: all 0.3s ease;
}

.categoria {
    font-weight: bold;
    margin: 25px auto 10px auto;
    width: 90%;
    font-size: 16px;
    color: #333;

    display: flex;
    align-items: center;
    gap: 8px;
}

</style>
</head>

<body>

<header>
<h1>Lista de Presentes<br>Erick & Francine</h1>
</header>

<main>
<ul id="lista-presentes"></ul>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB0FNd2sdqLARe3HfdFNv5yhQpIN9AQZNI",
    authDomain: "lista-presentes-casament-a314f.firebaseapp.com",
    projectId: "lista-presentes-casament-a314f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById('lista-presentes');

function criarItem(id, nome, marcado, categoria) {

    if (categoria) {
        const li = document.createElement('li');
        li.className = 'categoria';
        li.innerText = nome;
        return li;
    }

    const li = document.createElement('li');
    li.className = 'presente-item';
    if (marcado) li.classList.add('checked');

    const span = document.createElement('span');
    span.innerText = nome;

    li.appendChild(span);

    li.addEventListener('click', async () => {
        await updateDoc(doc(db, 'presentes', id), {
            marcado: !marcado
        });
    });

    return li;
}

onSnapshot(query(collection(db, 'presentes'), orderBy('ordem')), (snapshot) => {
    lista.innerHTML = '';

    snapshot.forEach(docSnap => {
        const d = docSnap.data();
        lista.appendChild(criarItem(docSnap.id, d.nome, d.marcado, d.categoria));
    });
});
</script>

</body>
</html>
