<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lista de Presentes - Erick & Francine</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
:root {
    --verde-pastel-claro: #e0f7f5;
    --verde-pastel: #7edbd3;
    --verde-pastel-escuro: #2bbbad;
    --nude-pastel: #f5f0eb;
    --rosa-pastel: #f2dcdc;
}

body {
    background: var(--verde-pastel-claro);
    font-family: sans-serif;
    margin: 0;
}

header {
    background: var(--verde-pastel);
    text-align: center;
    padding: 20px;
}

h1 {
    font-family: 'Playfair Display';
    font-size: 22px;
}

main {
    max-width: 600px;
    margin: auto;
    padding: 10px;
}

.presente-item {
    background: var(--nude-pastel);
    margin-bottom: 8px;
    padding: 12px;
    border-radius: 6px;
    display: flex;
    gap: 10px;
    cursor: pointer;
}

.presente-item.checked {
    background: var(--rosa-pastel);
    opacity: 0.6;
    text-decoration: line-through;
}

.categoria {
    font-weight: bold;
    margin-top: 15px;
}

</style>
</head>

<body>

<header>
<h1>Lista de Presentes<br>Erick & Francine</h1>
</header>

<main>
<ul id="lista-presentes"></ul>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB0FNd2sdqLARe3HfdFNv5yhQpIN9AQZNI",
    authDomain: "lista-presentes-casament-a314f.firebaseapp.com",
    projectId: "lista-presentes-casament-a314f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById('lista-presentes');

function criarItem(id, nome, marcado, categoria) {

    if (categoria) {
        const li = document.createElement('li');
        li.className = 'categoria';
        li.innerText = nome;
        return li;
    }

    const li = document.createElement('li');
    li.className = 'presente-item';
    if (marcado) li.classList.add('checked');

    const span = document.createElement('span');
    span.innerText = nome;

    li.appendChild(span);

    li.addEventListener('click', async () => {
        await updateDoc(doc(db, 'presentes', id), {
            marcado: !marcado
        });
    });

    return li;
}

onSnapshot(query(collection(db, 'presentes'), orderBy('ordem')), (snapshot) => {
    lista.innerHTML = '';

    snapshot.forEach(docSnap => {
        const d = docSnap.data();
        lista.appendChild(criarItem(docSnap.id, d.nome, d.marcado, d.categoria));
    });
});
</script>

</body>
</html>
