}

body {

}

header {
    background: var(--verde-pastel);

main {

button {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border: none;
    background: var(--verde-pastel-escuro);
    color: white;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
}

.presente-item {
    background: var(--nude-pastel);
    margin-bottom: 8px;
    padding: 12px;
    border-radius: 6px;
    display: flex;
    gap: 10px;
    cursor: pointer;
}

.presente-item.checked {
    background: var(--rosa-pastel);
    opacity: 0.6;
    text-decoration: line-through;
}

.categoria {
    font-weight: bold;
    margin-top: 15px;
}

</style>

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById('lista-presentes');

function criarItem(id, nome, marcado, categoria) {

    if (categoria) {
        const li = document.createElement('li');
        li.className = 'categoria';
        li.innerText = nome;
        return li;
    }

    const li = document.createElement('li');
    li.className = 'presente-item';
    if (marcado) li.classList.add('checked');

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = marcado;

    const span = document.createElement('span');
    span.innerText = nome;

    li.appendChild(checkbox);
    li.appendChild(span);

    li.onclick = async () => {
        await updateDoc(doc(db, 'presentes', id), {
            marcado: !checkbox.checked
        });
    };

    return li;
}

onSnapshot(collection(db, 'presentes'), (snapshot) => {
    lista.innerHTML = '';

    snapshot.forEach(docSnap => {
        const d = docSnap.data();
        lista.appendChild(criarItem(docSnap.id, d.nome, d.marcado, d.categoria));
    });
});
